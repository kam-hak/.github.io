<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Contract</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section id="gate" class="card gate">
        <h1>Daily Contract</h1>
        <p class="muted">
          Enter password to view. This is light deterrence only, not real security.
        </p>
        <label for="password-input">Password</label>
        <div class="gate-row">
          <input id="password-input" type="password" autocomplete="current-password" />
          <button id="unlock-btn" type="button">Unlock</button>
        </div>
        <p id="gate-error" class="error" aria-live="polite"></p>
      </section>

      <section id="app" class="hidden">
        <header class="card">
          <div class="header-row">
            <h1>Daily Contract</h1>
            <button id="lock-btn" type="button" class="secondary">Lock</button>
          </div>
          <p id="contract-meta" class="muted"></p>
        </header>

        <section class="card">
          <h2>Current Pull</h2>
          <p id="current-pull-title" class="pull-title"></p>
          <ul id="current-pull-checklist" class="checklist"></ul>
        </section>

        <section class="card">
          <h2>Allowed Switches</h2>
          <ul id="allowed-switches" class="plain-list"></ul>
        </section>

        <section class="card">
          <h2>Parking Lot</h2>
          <ul id="parking-lot" class="plain-list parking-list"></ul>
        </section>

        <section class="card kill-card">
          <h2>🔪🪦 Just Killed</h2>
          <ul id="killed-list" class="plain-list"></ul>
        </section>

        <section class="card">
          <h2>Checkoff History</h2>
          <p id="consistency-summary" class="muted"></p>
          <div id="heatmap-grid" class="heatmap-grid" aria-label="Daily checkoff heatmap"></div>
          <div class="heatmap-legend muted">
            <span>Less</span>
            <span class="swatch level-0"></span>
            <span class="swatch level-1"></span>
            <span class="swatch level-2"></span>
            <span class="swatch level-3"></span>
            <span class="swatch level-4"></span>
            <span>More</span>
          </div>
        </section>

        <section class="card">
          <h2>Previous Days</h2>
          <ul id="previous-days" class="plain-list previous-days"></ul>
        </section>

        <section class="card">
          <div class="header-row">
            <h2>Notes</h2>
            <button id="reset-btn" type="button" class="secondary">Reset Checks</button>
          </div>
          <p id="notes" class="muted"></p>
        </section>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
  </html>
