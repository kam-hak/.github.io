<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibes — Kamran Hakiman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Newsreader", Georgia, "Times New Roman", serif;
        }

        #nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
            font-size: 0.9rem;
        }
        #nav a {
            color: #0000EE;
            text-decoration: underline;
            text-decoration-thickness: 0.5px;
        }
        #nav a:hover { text-decoration-thickness: 2px; }

        #gallery { position: relative; width: 100%; height: 100%; }

        .gallery-img {
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 35vw;
            max-height: 35vh;
        }
        .gallery-img.visible { opacity: 1; }

        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            color: #888;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="nav"><a href="/">← back</a></div>
    <div id="gallery"></div>
    <div id="status">loading...</div>

    <script>
        const gallery = document.getElementById('gallery');
        const status  = document.getElementById('status');
        const placed  = [];

        function overlaps(x, y, w, h) {
            for (const r of placed) {
                if (x < r.x + r.w && x + w > r.x &&
                    y < r.y + r.h && y + h > r.y) return true;
            }
            return false;
        }

        function place(img) {
            const w = img.offsetWidth;
            const h = img.offsetHeight;
            const pad = 8;
            let availW = window.innerWidth;
            let availH = window.innerHeight;
            let tries = 0;

            while (true) {
                const x = pad + Math.random() * (availW - w - pad * 2);
                const y = pad + Math.random() * (availH - h - pad * 2);
                if (!overlaps(x, y, w, h)) {
                    placed.push({ x, y, w, h });
                    img.style.left = x + 'px';
                    img.style.top  = y + 'px';
                    img.classList.add('visible');
                    return;
                }
                if (++tries >= 50) {
                    availW = Math.min(availW + 120, window.innerWidth * 1.5);
                    availH = Math.min(availH + 120, window.innerHeight * 1.5);
                    tries = 0;
                }
            }
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function run() {
            let data;
            try {
                const res = await fetch('image_widths_heights.json');
                if (res.status === 404) throw new Error('not found');
                data = await res.json();
            } catch {
                status.textContent = 'run lister.py to generate image_widths_heights.json';
                return;
            }

            if (!data.length) {
                status.textContent = 'no images yet — add images and run lister.py';
                return;
            }

            status.style.display = 'none';
            const shuffled = shuffle([...data]);
            const screenW = window.innerWidth;

            const pairs = shuffled.map(([, [w, h]]) => {
                const goal = 500 * 300;
                const actual = w * h;
                if (actual / goal > 16) return [Math.floor(w / 8), Math.floor(h / 8)];
                if (actual / goal > 4)  return [Math.floor(w / 4), Math.floor(h / 4)];
                return [Math.floor(w / 2), Math.floor(h / 2)];
            }).map(([w, h]) => [w + 10 > screenW ? screenW - 10 : w, h]);

            let i = 0;
            function next() {
                if (i >= shuffled.length) return;
                const [filename] = shuffled[i];
                const [w, h] = pairs[i];
                i++;

                const img = document.createElement('img');
                img.className = 'gallery-img';
                img.loading = 'lazy';
                img.alt = '';
                img.style.width  = w + 'px';
                img.style.height = h + 'px';
                img.onload = () => { place(img); setTimeout(next, 100); };
                img.onerror = () => setTimeout(next, 100);
                gallery.appendChild(img);
                img.src = filename;
            }

            next();
        }

        run();
    </script>
</body>
</html>
