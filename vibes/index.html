<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibes — klh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            font-family: "Newsreader", Georgia, "Times New Roman", serif;
            padding: 2rem 1rem 0 1rem;
        }

        #nav {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
            font-size: 0.9rem;
        }
        #nav a {
            color: #0000EE;
            text-decoration: underline;
            text-decoration-thickness: 0.5px;
        }
        #nav a:hover { text-decoration-thickness: 2px; }

        #container { position: relative; }

        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            color: #888;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet">
</head>
<body>
    <h1>vibes</h1>
    <p style="font-size: 0.9rem;">inspired by <a href="https://www.xavicf.com/vibes">Xavi</a>, <a href="https://guzey.com/vibes/">Guzey</a>, <a href="https://girl.surgery/website_vibes/">Sophia</a>, and <a href="https://catherinebrewer.github.io/vibes/">Catherine</a>; <a href="https://gist.github.com/sophiawisdom/c1b16fcaca017d1aec2358c6fb619697">make your own</a>.</p>

    <div id="nav"><a href="/">← back</a></div>
    <div id="container"></div>
    <div id="status">loading...</div>

    <script>
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

fetch("image_widths_heights.json").then(f => {
    if (f.status == 404) {
        document.getElementById('status').textContent =
            'run lister.py to generate image_widths_heights.json';
        throw new Error("not found");
    }
    return f.json();
}).then(data => {
    if (!data.length) {
        document.getElementById('status').textContent =
            'no images yet — add images and run lister.py';
        return;
    }

    document.getElementById('status').style.display = 'none';

    let key_values = shuffleArray(data);

    const rect = container.getBoundingClientRect();
    let screen_width = rect.width;
    const containerOffsetTop = rect.top + window.pageYOffset;
    const containerOffsetLeft = rect.left + window.pageXOffset;

    // Resize images to be approximately a similar size using a smooth scale
    // instead of abrupt bucket cutoffs.
    const pairs = key_values.map(([key, [w, h]]) => {
        const target_pixels = 85000;
        const actual_pixels = w*h;
        const scale = Math.sqrt(target_pixels / actual_pixels);
        const clampedScale = Math.max(0.2, Math.min(0.5, scale));
        return [Math.round(w * clampedScale), Math.round(h * clampedScale)];
    }).map(([w, h]) => [(w+10) > screen_width ? screen_width-10 : w, h]);

    // gather all the text nodes so the images don't intersect them
    const textNodes = [];
    const treeWalker = document.createTreeWalker(
        document.body,
        NodeFilter.SHOW_TEXT,
        { acceptNode: (node) => node.textContent.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT }
    );
    while(treeWalker.nextNode()) textNodes.push(treeWalker.currentNode);

    // For each image, attempt to place it in a random location up to height 600.
    // If it intersects with any other images, try again. If after 50 attempts
    // we don't manage to place it, increase the height by 50.
    let positions = [];
    let i = 0;

    let interval = setInterval(() => {
        let height = 600;
        let [w, h] = pairs[i];
        while (1) {
            let found_place = false;
            let w_max = screen_width-w;
            let h_max = height-h;
            for (let _ = 0; _ < 50; _++) {
                let a_left = Math.random() * w_max;
                let a_top = Math.random() * h_max;
                let a_right = a_left+w;
                let a_bottom = a_top+h;

                // do intersection checks against images
                let intersects = false;
                for (let j = 0; j < positions.length; j++) {
                    let [b_left, b_top] = positions[j];
                    let b_right = b_left + pairs[j][0];
                    let b_bottom = b_top + pairs[j][1];
                    if (a_left < b_right && a_right > b_left && a_bottom > b_top && a_top < b_bottom) {
                        intersects = true;
                        break;
                    }
                }

                // do intersection checks against text
                for (const node of textNodes) {
                    const range = document.createRange();
                    range.selectNodeContents(node);
                    const rect = range.getBoundingClientRect();
                    let node_top = rect.top + window.pageYOffset - containerOffsetTop;
                    let node_left = rect.left + window.pageXOffset - containerOffsetLeft;

                    if (a_left < (node_left+rect.width) && a_right > node_left && a_bottom > node_top && a_top < (node_top+rect.height)) {
                        intersects = true;
                        break;
                    }
                }

                if (!intersects) {
                    found_place = true;
                    positions.push([parseInt(a_left), parseInt(a_top)]);
                    break;
                }
            }
            if (found_place) {
                break;
            } else {
                height += 50;
            }
        }

        // Create the image
        let img = document.createElement("img");
        img.src = key_values[i][0];
        img.width = pairs[i][0];
        img.height = pairs[i][1];
        img.style.width = pairs[i][0] + "px";
        img.style.height = pairs[i][1] + "px";
        img.style.position = "absolute";
        img.style.top = positions[i][1] + "px";
        img.style.left = positions[i][0] + "px";
        img.loading = "lazy";
        container.appendChild(img);

        i++;
        if (i == key_values.length) {
            clearInterval(interval);
        }
    }, 100);
});
    </script>
</body>
</html>
